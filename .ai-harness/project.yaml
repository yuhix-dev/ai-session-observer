name: ai-session-observer
language:
  - shell
  - go
main_commands:
  - ai-session-observer
  - ai-session
  - claude-watch
  - codex-watch
  - healthcheck
constraints:
  - read-only observation first
  - do not modify ~/.tmux.conf
  - do not destroy existing sessions or logs
entry_docs:
  - .ai-harness/docs/index.md
  - docs/product-spec.md
  - docs/architecture.md
overrides:
  docs: true
  prompts: true
  runbooks: true
  hooks: true
  memories: true
